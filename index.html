<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <meta charset="UTF-8" />

    <!-- PWA + Icons -->
    <link rel="icon" type="image/svg+xml" href="/ticket.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA Meta -->
    <meta name="theme-color" content="#f5a623" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Master Events" />
    <meta name="application-name" content="Master Events" />
    <meta name="msapplication-TileColor" content="#f5a623" />

    <!-- Description -->
    <meta name="description" content="Master Events — Africa's Blockchain-Powered Ticketing Platform. Buy, sell and transfer NFT tickets securely." />

    <!-- Open Graph -->
    <meta property="og:title" content="Master Events — Blockchain Ticketing" />
    <meta property="og:description" content="Africa's first blockchain-powered event ticketing platform. NFT tickets, secure QR, MoMo payments." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <title>Master Events — Blockchain Ticketing</title>

    <!-- ── Anti-flash theme script — must be before React loads ── -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('me_theme');
          var resolved = stored && stored !== 'system'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch(e) {}
      })();
    </script>

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
        width: 100%;
        overscroll-behavior: none;
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        height: 100%;
        width: 100%;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        padding-top:   env(safe-area-inset-top,   0px);
        padding-left:  env(safe-area-inset-left,  0px);
        padding-right: env(safe-area-inset-right, 0px);
      }

      #root {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        isolation: isolate;
      }

      /* Loading splash — shown while React boots */
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        background: var(--bg, #0e0d0b);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
