<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <meta charset="UTF-8" />

    <!-- PWA + Icons -->
    <link rel="icon" type="image/svg+xml" href="/ticket.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Viewport — viewport-fit=cover is CRITICAL for iPhone safe areas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA Meta -->
    <meta name="theme-color" content="#f5a623" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Master Events" />
    <meta name="application-name" content="Master Events" />
    <meta name="msapplication-TileColor" content="#f5a623" />

    <!-- Description -->
    <meta name="description" content="Master Events — Africa's Blockchain-Powered Ticketing Platform. Buy, sell and transfer NFT tickets securely." />

    <!-- Open Graph -->
    <meta property="og:title" content="Master Events — Blockchain Ticketing" />
    <meta property="og:description" content="Africa's first blockchain-powered event ticketing platform. NFT tickets, secure QR, MoMo payments." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <title>Master Events — Blockchain Ticketing</title>

    <!-- Critical: prevent flash of wrong theme -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('me-theme') ||
            document.cookie.match(/me-theme=([^;]+)/)?.[1] || 'system';
          if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
          else if (t === 'light') document.documentElement.setAttribute('data-theme','light');
          else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
            document.documentElement.setAttribute('data-theme','dark');
          else document.documentElement.setAttribute('data-theme','light');
        } catch(e){}
      })();
    </script>

    <style>
      /* Critical CSS — prevent layout shift before React loads */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
        /* Prevent rubber-band scrolling on iOS */
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      body {
        font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Fill entire screen including notch area */
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        /* DO NOT add padding-bottom here — BottomNav handles it */
      }
      /* Loading splash */
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        background: #f9f8f6;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
